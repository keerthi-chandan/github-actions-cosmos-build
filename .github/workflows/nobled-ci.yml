name: nobled CI

# Triggers
#   - push: builds run on main and the integration branch
#   - pull_request: PRs targeting main run CI but stop short of ECR push
#   - workflow_dispatch: manual trigger from the Actions tab
#   - schedule: nightly rebuild catches upstream Noble drift even when nobody pushes
on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
      - '.github/workflows/noble-cd.yml'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
      - '.github/workflows/noble-cd.yml'
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: cosmos/nobled
  NOBLE_REPO: https://github.com/strangelove-ventures/noble.git
  NOBLE_VERSION: v11.1.0-rc.1
  GO_VERSION: "1.24.13"

# Read-only by default at the workflow level; the publish job widens this
# to id-token: write so it can mint an OIDC token for AWS STS.
permissions:
  contents: read

# Prevent two pushes to main from racing on ECR push.
concurrency:
  group: nobled-ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build nobled binary
    runs-on: ubuntu-latest
    steps:
      - name: Code checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Clone Noble source
        run: |
          rm -rf noble
          git clone --depth 1 --branch "${NOBLE_VERSION}" "${NOBLE_REPO}" noble

      - name: Cache Go modules and build cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ env.GO_VERSION }}-${{ hashFiles('noble/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ env.GO_VERSION }}-

      - name: Build nobled
        working-directory: noble
        run: |
          make install
          "${HOME}/go/bin/nobled" version

      - name: Upload nobled binary
        uses: actions/upload-artifact@v4
        with:
          name: nobled-${{ github.sha }}
          path: ~/go/bin/nobled
          retention-days: 7

      - name: Notify if Build Fails
        if: failure()
        run: echo "::error::Build job failed — check logs above"

  test:
    name: Go unit tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Code checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Clone Noble source
        run: git clone --depth 1 --branch "${NOBLE_VERSION}" "${NOBLE_REPO}" noble

      - name: Restore Go cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ env.GO_VERSION }}-${{ hashFiles('noble/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ env.GO_VERSION }}-

      - name: Run tests (main branch only)
        if: github.ref == 'refs/heads/main'
        working-directory: noble
        run: go test ./... -timeout 15m

      - name: Skip tests on other branches
        if: github.ref != 'refs/heads/main'
        run: echo "Skipping unit tests on non-main branch"

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Code checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Clone Noble source
        run: git clone --depth 1 --branch "${NOBLE_VERSION}" "${NOBLE_REPO}" noble

      - name: Run golangci-lint (report-only)
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          working-directory: noble
          args: --timeout 10m --issues-exit-code 0

  gosec:
    name: gosec security scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Code checkout
        uses: actions/checkout@v4

      - name: Clone Noble source
        run: git clone --depth 1 --branch "${NOBLE_VERSION}" "${NOBLE_REPO}" noble

      - name: Run gosec
        uses: securego/gosec@master
        with:
          args: '-severity medium -confidence medium -no-fail -fmt sarif -out gosec.sarif ./noble/...'

      - name: Upload gosec SARIF
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gosec-results
          path: gosec.sarif

  trivy_fs:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Code checkout
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: json
          exit-code: 0
          vuln-type: os,library
          output: trivy-fs-results.json

      - name: Upload Trivy FS results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-fs-results
          path: trivy-fs-results.json

  publish:
    name: Build image & push to ECR
    runs-on: ubuntu-latest
    needs: [build, test, lint, gosec, trivy_fs]
    # Gate on main + push/schedule/dispatch — PRs run CI but never push.
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Code checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-actions-nobled-ci-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -f docker/Dockerfile \
            --build-arg NOBLE_REPO="${NOBLE_REPO}" \
            --build-arg NOBLE_VERSION="${NOBLE_VERSION}" \
            -t "${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}" \
            -t "${ECR_REGISTRY}/${ECR_REPOSITORY}:latest" \
            .
          docker push "${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
          docker push "${ECR_REGISTRY}/${ECR_REPOSITORY}:latest"
          echo "image=${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Trivy image scan (post-push, report-only)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.build-image.outputs.image }}
          severity: HIGH,CRITICAL
          exit-code: 0
          format: table

  notify:
    name: Slack notify
    runs-on: ubuntu-latest
    needs: [publish]
    if: always() && needs.publish.result != 'skipped'
    steps:
      - name: Slack success
        if: needs.publish.result == 'success'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "${SLACK_WEBHOOK_URL}" ]; then
            echo "SLACK_WEBHOOK_URL not set; skipping notify"
            exit 0
          fi
          curl -sS -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\":white_check_mark: nobled ${GITHUB_SHA::7} pushed to ECR\"}" \
            "${SLACK_WEBHOOK_URL}"

      - name: Slack failure
        if: needs.publish.result == 'failure'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "${SLACK_WEBHOOK_URL}" ]; then
            echo "SLACK_WEBHOOK_URL not set; skipping notify"
            exit 0
          fi
          curl -sS -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\":x: nobled ${GITHUB_SHA::7} failed — ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            "${SLACK_WEBHOOK_URL}"
