# Access-keys variant of nobled-ci.yml.
#
# This file is stored OUTSIDE .github/workflows/ on the main branch so it does
# not trigger runs. To use it, create a `legacy-keys` branch and replace the
# real workflow with this one — see docs/procedure.md §11.
#
# Diff vs main: drops OIDC (no id-token: write, no role-to-assume) and
# substitutes static IAM access keys via repo secrets. Mirrors course
# workflow-main-5.yaml line-for-line.

name: nobled CI/CD (legacy keys)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

env:
  ECR_REPOSITORY: cosmos/nobled
  NOBLE_REPO: https://github.com/strangelove-ventures/noble.git
  NOBLE_VERSION: v11.1.0-rc.1
  GO_VERSION: "1.24.13"

permissions:
  contents: read

concurrency:
  group: nobled-ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build nobled binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Clone Noble source
        run: |
          rm -rf noble
          git clone --depth 1 --branch "${NOBLE_VERSION}" "${NOBLE_REPO}" noble
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ env.GO_VERSION }}-${{ hashFiles('noble/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ env.GO_VERSION }}-
      - name: Build nobled
        working-directory: noble
        run: |
          make install
          "${HOME}/go/bin/nobled" version
      - uses: actions/upload-artifact@v4
        with:
          name: nobled-${{ github.sha }}
          path: ~/go/bin/nobled
          retention-days: 7
      - if: failure()
        run: echo "::error::Build job failed — check logs above"

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-go@v5
        with: { go-version: "${{ env.GO_VERSION }}" }
      - run: git clone --depth 1 --branch "${NOBLE_VERSION}" "${NOBLE_REPO}" noble
      - if: github.ref == 'refs/heads/main'
        working-directory: noble
        run: go test ./... -timeout 15m
      - if: github.ref != 'refs/heads/main'
        run: echo "Skipping unit tests on non-main branch"

  lint:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "${{ env.GO_VERSION }}" }
      - run: git clone --depth 1 --branch "${NOBLE_VERSION}" "${NOBLE_REPO}" noble
      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.62.2
          working-directory: noble
          args: --timeout 10m --issues-exit-code 0

  gosec:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - run: git clone --depth 1 --branch "${NOBLE_VERSION}" "${NOBLE_REPO}" noble
      - uses: securego/gosec@master
        with:
          args: '-severity medium -confidence medium -no-fail -fmt sarif -out gosec.sarif ./noble/...'
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gosec-results
          path: gosec.sarif

  trivy_fs:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          format: json
          exit-code: 0
          vuln-type: os,library
          output: trivy-fs-results.json
      - uses: actions/upload-artifact@v4
        with:
          name: trivy-fs-results
          path: trivy-fs-results.json

  publish:
    name: Build image & push to ECR (access keys)
    runs-on: ubuntu-latest
    needs: [build, test, lint, gosec, trivy_fs]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    environment: production
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Configure AWS credentials (static keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      - name: Build & push image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -f docker/Dockerfile \
            --build-arg NOBLE_REPO="${NOBLE_REPO}" \
            --build-arg NOBLE_VERSION="${NOBLE_VERSION}" \
            -t "${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}" \
            -t "${ECR_REGISTRY}/${ECR_REPOSITORY}:latest" \
            .
          docker push "${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
          docker push "${ECR_REGISTRY}/${ECR_REPOSITORY}:latest"
          echo "image=${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Trivy image scan (post-push, report-only)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ steps.build-image.outputs.image }}
          severity: HIGH,CRITICAL
          exit-code: 0
          format: table
